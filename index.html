<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UkaApp Pro</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
}

/* FEED */
.container {
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}
.video {
    height:100vh;
    position:relative;
    scroll-snap-align:start;
}
video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INFO */
.info {
    position:absolute;
    bottom:80px;
    left:10px;
}

/* ACTIONS */
.actions {
    position:absolute;
    right:10px;
    bottom:100px;
}
.actions div {
    margin:15px 0;
    font-size:22px;
}

/* NAV */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:10px;
}

/* COMMENTS */
.comment-box {
    position:fixed;
    bottom:0;
    background:#222;
    width:100%;
    height:50%;
    display:none;
    padding:10px;
}
</style>
</head>

<body>

<div class="container" id="feed"></div>

<!-- COMMENTS -->
<div class="comment-box" id="comments">
<h3>Comments</h3>
<div id="commentList"></div>
<input id="commentInput" placeholder="Write comment...">
<button onclick="addComment()">Send</button>
</div>

<!-- NAV -->
<div class="nav">
<div>🏠</div>
<div onclick="toggleComments()">💬</div>
<div>👤</div>
</div>

<script>

let videos = [
{
url:"https://www.w3schools.com/html/mov_bbb.mp4",
user:"admin",
caption:"🔥 Trending video",
likes:0,
comments:["Nice🔥","Wow🔥"]
},
{
url:"https://www.w3schools.com/html/movie.mp4",
user:"user",
caption:"😂 Funny clip",
likes:0,
comments:["😂😂","Hii kali"]
}
];

let currentIndex = 0;

function loadVideos(){
let feed = document.getElementById("feed");
feed.innerHTML="";

videos.forEach((v,i)=>{
feed.innerHTML+=`
<div class="video">
<video src="${v.url}" autoplay loop muted></video>

<div class="info">
<b>@${v.user}</b>
<p>${v.caption}</p>
</div>

<div class="actions">
<div onclick="like(${i})">❤️ ${v.likes}</div>
<div onclick="openComments(${i})">💬</div>
</div>
</div>
`;
});
}

function like(i){
videos[i].likes++;
loadVideos();
}

function openComments(i){
currentIndex = i;
let list = document.getElementById("commentList");
list.innerHTML = "";

videos[i].comments.forEach(c=>{
list.innerHTML += "<p>"+c+"</p>";
});

document.getElementById("comments").style.display="block";
}

function toggleComments(){
document.getElementById("comments").style.display="none";
}

function addComment(){
let text = document.getElementById("commentInput").value;
if(!text) return;

videos[currentIndex].comments.push(text);
openComments(currentIndex);
}

loadVideos();

</script>

</body>
</html>
