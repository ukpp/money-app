<!DOCTYPE html>
<html>
<head>
  <title>Neema Salon</title>

  <style>
    body {
      font-family: Arial;
      background-color: #ffe6f0;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      padding: 20px;
    }

    h1 {
      color: #cc0066;
      margin-top: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    h2 {
      color: #333;
      margin-top: 30px;
    }

    p {
      font-size: 16px;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      margin: 5px 0;
    }

    /* SLIDER */
    .slider {
      width: 90%;
      height: 200px;
      margin: auto;
      border-radius: 15px;
      background-size: cover;
      background-position: center;
      animation: slide 9s infinite;
    }

    @keyframes slide {
      0% {
        background-image: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9');
      }
      33% {
        background-image: url('https://images.unsplash.com/photo-1512496015851-a90fb38ba796');
      }
      66% {
        background-image: url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f');
      }
      100% {
        background-image: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9');
      }
    }

    button {
      background-color: #cc0066;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      margin-top: 10px;
      font-size: 16px;
    }

    button:hover {
      background-color: #99004d;
      transform: scale(1.1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade {
      animation: fadeIn 2s ease-in-out;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Neema Salon</h1>
    <p>Huduma bora za urembo Dar es Salaam</p>

    <!-- SLIDER -->
    <div class="slider"></div>

    <h2 class="fade">Huduma Zetu</h2>
    <ul>
      <li>Kusuka nywele</li>
      <li>Kupaka rangi</li>
      <li>Manicure na Pedicure</li>
    </ul>

    <h2 class="fade">Kuhusu Sisi</h2>
    <p>Tunatoa huduma bora kwa wateja wetu kwa bei nafuu.</p>

    <h2 class="fade">Mawasiliano</h2>
    <p>Piga simu: 07XXXXXXXX</p>

    <a href="https://wa.me/2557XXXXXXXX">
      <button>Wasiliana nasi WhatsApp</button>
    </a>
  </div>

</body>
</html>
