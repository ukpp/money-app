<!DOCTYPE html>
<html>
<head>
<title>Money App PRO 💰</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
}

h1 { color: #22c55e; }

.card {
    background: #1e293b;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
}

input {
    padding: 10px;
    width: 80%;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.balance {
    font-size: 30px;
    color: #22c55e;
}
</style>
</head>

<body>

<h1>💰 Money App PRO</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Login / Register</h2>
    <input type="text" id="username" placeholder="Enter username">
    <br>
    <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
    <h2 id="welcome"></h2>
    <div class="balance" id="balance">0</div>
</div>

<div class="card">
    <h3>Earn Money 🎯</h3>
    <button onclick="earn()">+10</button>
</div>

<div class="card">
    <h3>Withdraw 💸</h3>
    <input type="number" id="amount" placeholder="Enter amount">
    <button onclick="withdraw()">Withdraw</button>
</div>

</div>

<script>
let user = localStorage.getItem("user");

if (user) {
    startApp(user);
}

function login() {
    let name = document.getElementById("username").value;
    if (name == "") return alert("Weka jina");

    localStorage.setItem("user", name);

    if (!localStorage.getItem(name)) {
        localStorage.setItem(name, 0);
    }

    startApp(name);
}

function startApp(name) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText = "Karibu " + name;

    loadBalance();
}

function loadBalance() {
    let user = localStorage.getItem("user");
    let bal = localStorage.getItem(user);
    document.getElementById("balance").innerText = bal + " TZS";
}

function earn() {
    let user = localStorage.getItem("user");
    let bal = parseInt(localStorage.getItem(user));

    bal += 10;
    localStorage.setItem(user, bal);

    loadBalance();
}

function withdraw() {
    let user = localStorage.getItem("user");
    let bal = parseInt(localStorage.getItem(user));
    let amount = parseInt(document.getElementById("amount").value);

    if (amount > bal) {
        alert("Salio haitoshi 😅");
    } else if (amount < 100) {
        alert("Minimum ni 100 TZS");
    } else {
        bal -= amount;
        localStorage.setItem(user, bal);
        loadBalance();
        alert("Withdraw request sent 💸 (demo)");
    }
}
</script>

</body>
    </html>
