<!DOCTYPE html>
<html>
<head>
<title>Money App 💰</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
    margin: 0;
}

h1 {
    color: #22c55e;
    margin-top: 20px;
}

.card {
    background: #1e293b;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
}

.balance {
    font-size: 30px;
    color: #22c55e;
}

button {
    padding: 12px 20px;
    border: none;
    background: #22c55e;
    color: black;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<h1>💰 Money App</h1>

<div class="card">
    <h2>Your Balance</h2>
    <div class="balance" id="balance">0</div>
</div>

<div class="card">
    <h2>Earn Money 🎯</h2>
    <p>Bonyeza kupata coins</p>
    <button onclick="earn()">Earn +10</button>
</div>

<div class="card">
    <h2>Daily Bonus 🎁</h2>
    <button onclick="bonus()">Get Bonus</button>
</div>

<script>
// LOAD BALANCE
let balance = localStorage.getItem("money");

if (balance == null) {
    balance = 0;
} else {
    balance = parseInt(balance);
}

update();

// UPDATE UI
function update() {
    document.getElementById("balance").innerText = balance + " TZS";
}

// EARN
function earn() {
    balance += 10;
    save();
}

// BONUS (1 time per day simple)
function bonus() {
    let last = localStorage.getItem("bonus");

    if (last == new Date().toDateString()) {
        alert("Tayari umeshachukua bonus leo 😅");
    } else {
        balance += 50;
        localStorage.setItem("bonus", new Date().toDateString());
        save();
        alert("Umepewa 50 TZS 🎉");
    }
}

// SAVE
function save() {
    localStorage.setItem("money", balance);
    update();
}
</script>

</body>
</html>
