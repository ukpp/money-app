<!DOCTYPE html>
<html>
<head>
<title>Entertainment App PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
    margin: 0;
}

h1 {
    color: #00ffcc;
    margin-top: 20px;
}

.card {
    background: #222;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 10px #00ffcc33;
}

button {
    padding: 12px 20px;
    border: none;
    background: #00ffcc;
    color: black;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
}

button:hover {
    background: #00ccaa;
}

audio {
    margin-top: 10px;
    width: 100%;
}
</style>
</head>

<body>

<h1>🔥 Entertainment App PRO 🔥</h1>

<!-- JOKES API -->
<div class="card">
    <h2>😂 Jokes (Online)</h2>
    <p id="joke">Bonyeza kupata joke kutoka internet</p>
    <button onclick="getJoke()">Get Joke</button>
</div>

<!-- MUSIC PLAYER -->
<div class="card">
    <h2>🎵 Music Player</h2>
    <audio id="player" controls></audio>
    <br>
    <button onclick="nextSong()">Next Song ▶️</button>
</div>

<!-- GAMES -->
<div class="card">
    <h2>🎮 Games</h2>
    <p>Coming soon (tutaweka game next 😎)</p>
</div>

<script>
// JOKE API
async function getJoke() {
    let res = await fetch("https://official-joke-api.appspot.com/random_joke");
    let data = await res.json();
    document.getElementById("joke").innerText = data.setup + " 😂 " + data.punchline;
}

// MUSIC LIST
let songs = [
    "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
    "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
];

let index = 0;
let player = document.getElementById("player");

// LOAD FIRST SONG
player.src = songs[index];

function nextSong() {
    index++;
    if (index >= songs.length) index = 0;
    player.src = songs[index];
    player.play();
}
</script>

</body>
</html>
