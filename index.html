<!DOCTYPE html>
<html>
<head>
<title>Entertainment App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
}

h1 {
    color: #00ffcc;
}

.card {
    background: #222;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

button {
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 Entertainment App 🔥</h1>

<div class="card">
    <h2>😂 Jokes</h2>
    <p id="joke">Bonyeza kuona joke</p>
    <button onclick="getJoke()">Get Joke</button>
</div>

<div class="card">
    <h2>🎵 Music</h2>
    <audio controls>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    </audio>
</div>

<div class="card">
    <h2>🎮 Game</h2>
    <p id="result">Guess number 1-5</p>
    <input type="number" id="num">
    <button onclick="play()">Try</button>
</div>

<script>
function getJoke() {
    let jokes = ["😂 maisha magumu", "🤣 wifi ikikatika shida", "😅 njaa mbaya"];
    let r = Math.floor(Math.random()*jokes.length);
    document.getElementById("joke").innerText = jokes[r];
}

function play() {
    let n = Math.floor(Math.random()*5)+1;
    let u = document.getElementById("num").value;

    if(u == n){
        document.getElementById("result").innerText = "Umeshinda 🎉";
    } else {
        document.getElementById("result").innerText = "Umeshindwa ilikuwa " + n;
    }
}
</script>

</body>
</html>
