<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UkaApp</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
}

/* FEED */
.container {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}
.video {
    height: 100vh;
    position: relative;
    scroll-snap-align: start;
}
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* INFO */
.info {
    position: absolute;
    bottom: 80px;
    left: 10px;
}

/* ACTIONS */
.actions {
    position: absolute;
    right: 10px;
    bottom: 100px;
}
.actions div {
    margin: 15px 0;
    cursor: pointer;
}

/* NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

/* UPLOAD BOX */
.upload-box {
    position: fixed;
    top: 20%;
    left: 10%;
    width: 80%;
    background: #222;
    padding: 20px;
    display: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- FEED -->
<div class="container" id="feed"></div>

<!-- UPLOAD -->
<div class="upload-box" id="uploadBox">
<h3>Upload Video</h3>
<input type="file"><br><br>
<textarea placeholder="Caption..."></textarea><br>
<button onclick="closeUpload()">Post</button>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="loadVideos()">🏠</div>
<div onclick="openUpload()">➕</div>
<div>👤</div>
</div>

<script>

/* VIDEO ZA HAKIKA (ZITATOKEA) */
let videos = [
{
url: "https://www.w3schools.com/html/mov_bbb.mp4",
caption: "🔥 Karibu UkaApp",
user: "admin",
likes: 0
},
{
url: "https://www.w3schools.com/html/movie.mp4",
caption: "😂 Burudani tu",
user: "user",
likes: 0
}
];

function loadVideos() {
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    videos.forEach((v, i) => {
        feed.innerHTML += `
        <div class="video">
            <video src="${v.url}" autoplay loop muted controls></video>

            <div class="info">
                <h4>@${v.user}</h4>
                <p>${v.caption}</p>
            </div>

            <div class="actions">
                <div onclick="like(${i})">❤️ <span id="like${i}">${v.likes}</span></div>
                <div onclick="comment()">💬</div>
            </div>
        </div>
        `;
    });
}

function like(i) {
    videos[i].likes++;
    document.getElementById("like"+i).innerText = videos[i].likes;
}

function comment() {
    let text = prompt("Comment:");
    if (text) alert("Comment: " + text);
}

function openUpload() {
    document.getElementById("uploadBox").style.display = "block";
}

function closeUpload() {
    document.getElementById("uploadBox").style.display = "none";
}

/* MUHIMU – LOAD VIDEO AUTOMATIC */
loadVideos();

</script>

</body>
</html>
