<!DOCTYPE html>
<html>
<head>
  <title>Entertainment App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      color: #00ffcc;
    }

    .card {
      background: #1c1c1c;
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #111;
      color: #00ffcc;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      border: 5px solid #333;
      border-top: 5px solid #00ffcc;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>🔥 Entertainment App 🔥</h1>
  <div class="spinner"></div>
</div>

<!-- APP CONTENT -->
<h1>🔥 Entertainment App 🔥</h1>

<div class="card">
  <h2>😂 Jokes</h2>
  <p id="joke">Bonyeza kupata joke</p>
  <button onclick="getJoke()">Get Joke</button>
</div>

<div class="card">
  <h2>🎵 Music</h2>
  <audio controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="card">
  <h2>📺 Video</h2>
  <iframe width="100%" height="200"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    frameborder="0" allowfullscreen>
  </iframe>
</div>

<script>
function getJoke() {
  let jokes = [
    "Teacher: Why HTML? Student: Because I LOVE tags 😂",
    "Programmer alilia… semicolon ilikosekana 😭",
    "Why JavaScript? Because life needs FUN 😎"
  ];

  let random = Math.floor(Math.random() * jokes.length);
  document.getElementById("joke").innerText = jokes[random];
}

/* SPLASH CONTROL */
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
}, 3000);
</script>

</body>
</html>
