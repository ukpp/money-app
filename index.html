<!DOCTYPE html>
<html>
<head>
<title>Entertainment App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
}

h1 {
    color: #00ffcc;
    margin-top: 20px;
}

.card {
    background: #222;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

button {
    padding: 10px 20px;
    border: none;
    background: #00ffcc;
    color: black;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
}

audio {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🔥 Entertainment App 🔥</h1>

<!-- JOKES -->
<div class="card">
    <h2>😂 Jokes</h2>
    <p id="joke">Bonyeza kuona joke</p>
    <button onclick="getJoke()">Get Joke</button>
</div>

<!-- MUSIC -->
<div class="card">
    <h2>🎵 Music</h2>
    <p>Play music hapa chini</p>

    <audio controls>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
</div>

<!-- GAMES -->
<div class="card">
    <h2>🎮 Games</h2>
    <p>Coming soon...</p>
</div>

<script>
function getJoke() {
    let jokes = [
        "Teacher: Why HTML? Student: Because life needs structure 😂",
        "Why did the computer laugh? Because it had a byte 😂",
        "Programmer alilia? Alipata bug 🐛😂",
        "Why JavaScript? Because HTML can't think 😂"
    ];

    let random = Math.floor(Math.random() * jokes.length);
    document.getElementById("joke").innerText = jokes[random];
}
</script>

</body>
</html>
