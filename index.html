<!DOCTYPE html>
<html>
<head>
  <title>Entertainment App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
    }

    h1 {
      color: #00ffcc;
      margin-top: 20px;
    }

    .card {
      background: #222;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      background: #00ffcc;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🔥 Entertainment App 🔥</h1>

<div class="card">
  <h2>😂 Jokes</h2>
  <p id="joke">Bonyeza kuona joke</p>
  <button onclick="getJoke()">Get Joke</button>
</div>

<div class="card">
  <h2>🎵 Music</h2>
  <p>Coming soon...</p>
</div>

<div class="card">
  <h2>🎮 Games</h2>
  <p>Coming soon...</p>
</div>

<script>
function getJoke() {
  const jokes = [
    "Teacher: Why are you late? Student: Using slow internet 😂",
    "Programmer alioa laptop yake 💻❤️",
    "Maisha ni kama WiFi… ukikaa mbali yanakata 😅"
  ];
  
  document.getElementById("joke").innerText =
    jokes[Math.floor(Math.random() * jokes.length)];
}
</script>

</body>
</html>
