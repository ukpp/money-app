<!DOCTYPE html>
<html>
<head>
  <title>Entertainment App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
    }

    h1 {
      color: #00ffcc;
    }

    .card {
      background: #222;
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    iframe, audio {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🔥 Entertainment App 🔥</h1>

<!-- JOKES -->
<div class="card">
  <h2>😂 Jokes</h2>
  <p id="joke">Bonyeza kupata joke</p>
  <button onclick="getJoke()">Get Joke</button>
</div>

<!-- MUSIC -->
<div class="card">
  <h2>🎵 Music</h2>
  <audio controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>
</div>

<!-- VIDEO -->
<div class="card">
  <h2>📺 Video</h2>
  <iframe height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
  frameborder="0" allowfullscreen></iframe>
</div>

<script>
function getJoke() {
  let jokes = [
    "Teacher: Why HTML? Student: Because life needs structure 😂",
    "Programmer: I love bugs… they make me rich 😎",
    "Why JavaScript? Because Java was too serious 😂",
    "Coding usiku = mafanikio kesho 🔥"
  ];

  let random = Math.floor(Math.random() * jokes.length);
  document.getElementById("joke").innerText = jokes[random];
}

// PWA install
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
