<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UkaApp</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
}

/* SCREENS */
.screen { display: none; }
.active { display: block; }

/* FEED */
.container {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}
.video {
    height: 100vh;
    position: relative;
    scroll-snap-align: start;
}
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* INFO */
.info {
    position: absolute;
    bottom: 80px;
    left: 10px;
}

/* ACTIONS */
.actions {
    position: absolute;
    right: 10px;
    bottom: 100px;
}
.actions div {
    margin: 15px 0;
    cursor: pointer;
}

/* NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

/* INPUT */
input, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h2 style="text-align:center;">UkaApp Login</h2>
<input type="text" id="username" placeholder="Username">
<button onclick="login()">Ingia</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
<div class="container" id="feed"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h2 style="text-align:center;">Profile</h2>
<p id="userDisplay" style="text-align:center;"></p>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="showScreen('home')">🏠</div>
<div onclick="showScreen('profile')">👤</div>
</div>

<script>
let currentUser = localStorage.getItem("user");

/* VIDEO ZA ONLINE (NDIO ZITAFANYA KAZI GITHUB) */
let videos = [
{
url: "https://www.w3schools.com/html/mov_bbb.mp4",
caption: "🔥 Karibu UkaApp",
user: "admin",
likes: 0,
comments: []
},
{
url: "https://www.w3schools.com/html/movie.mp4",
caption: "😂 Burudani tu",
user: "user",
likes: 0,
comments: []
}
];

function login() {
    let user = document.getElementById("username").value;
    if (!user) return alert("Weka username");

    localStorage.setItem("user", user);
    currentUser = user;

    document.getElementById("userDisplay").innerText = "User: " + user;

    showScreen("home");
    loadVideos();
}

function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function loadVideos() {
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    videos.forEach((v, i) => {
        feed.innerHTML += `
        <div class="video">
            <video src="${v.url}" autoplay loop muted controls></video>

            <div class="info">
                <h4>@${v.user}</h4>
                <p>${v.caption}</p>
            </div>

            <div class="actions">
                <div onclick="like(${i})">❤️ <span id="like${i}">${v.likes}</span></div>
                <div onclick="comment()">💬</div>
            </div>
        </div>
        `;
    });
}

function like(i) {
    videos[i].likes++;
    document.getElementById("like"+i).innerText = videos[i].likes;
}

function comment() {
    let text = prompt("Andika comment:");
    if (text) alert("Comment: " + text);
}

/* AUTO LOGIN */
if (currentUser) {
    document.getElementById("userDisplay").innerText = "User: " + currentUser;
    showScreen("home");
    loadVideos();
}
</script>

</body>
</html>
